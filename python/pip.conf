[global]
# Pip configuration for better performance and defaults

# Connection settings
timeout = 60
retries = 3

# Cache settings
cache-dir = ~/.cache/pip

# Default package index
index-url = https://pypi.org/simple/
trusted-host = pypi.org
                files.pythonhosted.org

# Installation preferences
user = true
upgrade-strategy = eager

# Logging
log = ~/.cache/pip/pip.log

[install]
# Always upgrade dependencies when installing
upgrade = true

# Prefer binary wheels over source distributions
prefer-binary = true

[list]
# Show outdated packages by default
outdated = true
format = columns

[freeze]
# Exclude editable packages from freeze
exclude-editable = true